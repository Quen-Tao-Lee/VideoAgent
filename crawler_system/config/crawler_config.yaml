analysis:
  report_generation: true
  sentiment_model: snownlp
  trend_analysis: true
  visualization_enabled: true
crawler:
  concurrent_requests: 8
  delay_range:
  - 1
  - 3
  retry_times: 3
  robots_txt_obey: true
  timeout: 30
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
database:
  backup_enabled: true
  path: crawler_data.db
  retention_days: 30
  type: sqlite
ecommerce:
  enabled_platforms:
  - taobao
  - jd
  - tmall
  image_download: false
  max_pages: 10
  price_monitor: true
  review_limit: 100
logging:
  backup_count: 5
  file_path: logs/crawler.log
  level: INFO
  max_size: 100MB
proxy:
  enabled: false
  proxy_list: []
  rotation_enabled: true
social_media:
  authenticity_check: true
  enabled_platforms:
  - weibo
  - zhihu
  - xiaohongshu
  keyword_filtering: true
  max_posts: 500
  sentiment_analysis: true
